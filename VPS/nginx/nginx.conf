user root;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 8192;
    multi_accept on;
    accept_mutex on;
}

http {
    proxy_buffering off; #禁用缓冲，优化大文件传输，若只是正常网站，请删除

    client_max_body_size 10240m;
    sendfile on;
    directio 4m;
    directio_alignment 512;
    tcp_nopush on; 
    tcp_nodelay on;  
    keepalive_timeout 60;

    gzip on;
    gzip_comp_level 2;
    gzip_min_length 20k;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        text/javascript
        application/xml;

    include mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
#    ssl_certificate /etc/nginx/cert.crt;  #全局证书
#    ssl_certificate_key /etc/nginx/cert.key;  #全局证书

    access_log off;
    # access_log /var/log/nginx/access.log;
    # error_log /var/log/nginx/error.log;

    server { #websocks反代
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name example.com; #你的域名 
        ssl_certificate /etc/nginx/example.crt;  #自定义证书
        ssl_certificate_key /etc/nginx/example.key; #自定义证书
        
        location / {
            proxy_pass http://localhost:11451; #反代地址

            proxy_set_header Upgrade $http_upgrade; #websocks支持
            proxy_set_header Connection "Upgrade"; #websocks支持
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server { #gRPC反代
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name example.com; #你的域名 
        ssl_certificate /etc/nginx/example.crt;
        ssl_certificate_key /etc/nginx/example.crt;
        ssl_stapling on;
        ssl_session_timeout 1d;
        underscores_in_headers on;
        keepalive_requests 100000;
        
        location / {
            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
            grpc_socket_keepalive on;
            grpc_pass grpc://localhost:65535;
        }
    }

    server { #普通反代
        listen 80;
        listen [::]:80;
        server_name example.com; #你的域名

        location / {
            proxy_pass http://localhost:11451; #反代地址
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server { #反代，增加path[访问example.com/example/1.html == lttp://localhost:11451/1.html ]
        listen 80;
        listen [::]:80;
        server_name example.com; #你的域名

        location /example {
            rewrite ^/example/?(.*)$ /$1 break;

            proxy_pass http://localhost:11451; #反代地址
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }    

    server { #目录映射
        listen 80;
        listen [::]:80;
        server_name example.com; #你的域名
        root /root/share/;

        location / {
            autoindex on; #开启文件目录
            try_files $uri $uri/ =404;
        }
    }

    server { #重定向到HTTPS
        listen 80;
        listen [::]:80;
        server_name example.com;
        if ($host = example.com) {
            return 301 https://$host$request_uri;
        } # managed by Certbot
        return 404;
    }
}
